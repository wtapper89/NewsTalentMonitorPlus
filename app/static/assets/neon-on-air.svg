<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc">
  <title id="title">On Air neon sign</title>
  <desc id="desc">A blue neon outlined sign with white ON and red AIR lettering.</desc>
  <defs>
    <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.72 0 0 0 0 1.00 0 0 0 0.95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="whiteGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.78 0 0 0 0 1.00 0 0 0 0.9 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 1.00 0 0 0 0 0.16 0 0 0 0 0.06 0 0 0 0.95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="brick" width="72" height="36" patternUnits="userSpaceOnUse">
      <path d="M0 0h72v36H0z" fill="#160f24"/>
      <path d="M0 35h72M71 0v36M36 0v18M0 18h36M36 18h36" fill="none" stroke="#090612" stroke-width="3" opacity=".72"/>
    </pattern>
  </defs>
  <rect width="720" height="300" rx="28" fill="url(#brick)"/>
  <rect x="50" y="54" width="620" height="190" rx="60" fill="#110a20" opacity=".55"/>
  <path d="M110 63h110M262 63h320q78 0 78 78v20q0 78-78 78H262M220 239H110q-70 0-70-70v-36q0-70 70-70" fill="none" stroke="#16cfff" stroke-width="12" stroke-linecap="round" filter="url(#blueGlow)"/>
  <path d="M118 63h95M272 63h300q72 0 72 72v30q0 72-72 72H272M213 237H118q-62 0-62-62v-50q0-62 62-62" fill="none" stroke="#8befff" stroke-width="3" stroke-linecap="round"/>
  <text x="105" y="184" fill="none" stroke="#f4f0ff" stroke-width="8" filter="url(#whiteGlow)" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="2">ON</text>
  <text x="305" y="184" fill="none" stroke="#ff442d" stroke-width="9" filter="url(#redGlow)" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="2">AIR</text>
  <text x="105" y="184" fill="#fff" opacity=".42" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="2">ON</text>
  <text x="305" y="184" fill="#ff371f" opacity=".36" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="2">AIR</text>
</svg>
