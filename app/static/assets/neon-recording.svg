<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Recording neon sign</title>
  <desc id="desc">A red recording neon sign with a blue outer tube.</desc>
  <defs>
    <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.70 0 0 0 0 1.00 0 0 0 0.95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 1.00 0 0 0 0 0.12 0 0 0 0 0.05 0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="brick" width="76" height="38" patternUnits="userSpaceOnUse">
      <path d="M0 0h76v38H0z" fill="#140f20"/>
      <path d="M0 37h76M75 0v38M38 0v19M0 19h38M38 19h38" fill="none" stroke="#090711" stroke-width="3" opacity=".75"/>
    </pattern>
  </defs>
  <rect width="760" height="300" rx="28" fill="url(#brick)"/>
  <rect x="48" y="54" width="664" height="190" rx="58" fill="#12091d" opacity=".58"/>
  <path d="M108 64h544q60 0 60 60v52q0 60-60 60H108q-60 0-60-60v-52q0-60 60-60" fill="none" stroke="#16cfff" stroke-width="11" stroke-linecap="round" filter="url(#blueGlow)"/>
  <path d="M118 66h524q52 0 52 52v64q0 52-52 52H118q-52 0-52-52v-64q0-52 52-52" fill="none" stroke="#86edff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="135" cy="150" r="31" fill="none" stroke="#ff311f" stroke-width="10" filter="url(#redGlow)"/>
  <circle cx="135" cy="150" r="17" fill="#ff311f" opacity=".52" filter="url(#redGlow)"/>
  <text x="195" y="181" fill="none" stroke="#ff3425" stroke-width="8" filter="url(#redGlow)" font-family="Arial Black, Arial, sans-serif" font-size="74" font-weight="900" letter-spacing="1">RECORDING</text>
  <text x="195" y="181" fill="#ff3425" opacity=".38" font-family="Arial Black, Arial, sans-serif" font-size="74" font-weight="900" letter-spacing="1">RECORDING</text>
</svg>
