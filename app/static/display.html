<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Talent Monitor+ Display</title>
    <link rel="stylesheet" href="/static/display.css?v=20260713-fixed-zone-meters" />
  </head>
  <body>
    <main class="display-shell">
      <details class="kiosk-menu">
        <summary class="kiosk-menu-toggle" title="Open menu" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </summary>
        <nav class="kiosk-menu-panel" aria-label="Kiosk navigation">
          <a href="/display">Talent Display</a>
          <a href="/room-sign">Room Sign</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/config">Config</a>
        </nav>
      </details>
      <header class="display-header">
        <div class="clock-block">
          <span class="clock-time" id="clockTime">--:--:-- --</span>
        </div>
        <div class="source-board" aria-label="Current rundown sources">
          <section class="source-panel source-panel-now" id="nowPanel">
            <span class="source-label" id="nowLabel">Now</span>
            <span class="source-name" id="nowSource">---</span>
          </section>
          <section class="source-panel source-panel-next" id="nextPanel">
            <span class="source-label" id="nextLabel">Next</span>
            <span class="source-name" id="nextSource">---</span>
          </section>
        </div>
      </header>

      <section class="preview-shell">
        <aside class="audio-meter-dock" id="audioMeterDock" aria-label="Audio meters"></aside>
        <div class="preview-stage" id="previewStage">
          <div class="preview-frame" id="previewFrame"></div>
          <aside class="status-sign status-sign-empty" id="statusSign" aria-live="polite" aria-label="Production status"></aside>
        </div>
      </section>

      <section class="mic-strip" id="micStrip"></section>
    </main>

    <script src="/static/display.js?v=20260713-audio-meters-update-neon" defer></script>
  </body>
</html>
