<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor Mics Display</title>
    <link rel="stylesheet" href="/static/display.css" />
  </head>
  <body>
    <main class="display-shell">
      <a class="kiosk-menu" href="/config" title="Open config" aria-label="Open config">
        <span></span>
        <span></span>
        <span></span>
      </a>
      <header class="display-header">
        <div class="clock-block">
          <span class="clock-time" id="clockTime">--:--:-- --</span>
        </div>
        <div class="source-board" aria-label="Current rundown sources">
          <section class="source-panel source-panel-now">
            <span class="source-label">Now</span>
            <span class="source-name" id="nowSource">---</span>
          </section>
          <section class="source-panel source-panel-next">
            <span class="source-label">Next</span>
            <span class="source-name" id="nextSource">---</span>
          </section>
        </div>
      </header>

      <section class="preview-shell">
        <div class="preview-frame" id="previewFrame"></div>
      </section>

      <section class="mic-strip" id="micStrip"></section>
    </main>

    <script src="/static/display.js" defer></script>
  </body>
</html>
