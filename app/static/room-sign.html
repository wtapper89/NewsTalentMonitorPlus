<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Talent Monitor+ Room Sign</title>
    <link rel="stylesheet" href="/static/room-sign.css?v=20260612-status-viewport-fit" />
  </head>
  <body>
    <main class="room-sign-shell">
      <details class="kiosk-menu">
        <summary class="kiosk-menu-toggle" title="Open menu" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </summary>
        <nav class="kiosk-menu-panel" aria-label="Kiosk navigation">
          <a href="/display">Talent Display</a>
          <a href="/room-sign">Room Sign</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/config">Config</a>
        </nav>
      </details>
      <section class="status-view" id="statusView" aria-live="polite">
        <div class="status-word"><span id="statusText">ON AIR</span></div>
        <footer class="event-footer">
          <div class="event-title" id="currentEventTitle">---</div>
          <div class="event-meta" id="currentEventMeta">---</div>
        </footer>
      </section>

      <section class="schedule-view" id="scheduleView">
        <header class="schedule-header">
          <div>
            <p class="schedule-kicker">Room Schedule</p>
            <h1 id="scheduleRoomName">Studio</h1>
          </div>
          <div class="schedule-side">
            <div class="availability-pill" id="availabilityPill">Available</div>
            <time id="clockText">--:-- --</time>
          </div>
        </header>
        <div class="event-list" id="eventList"></div>
        <div class="room-fallback" id="roomFallback"></div>
        <div class="schedule-error" id="scheduleError"></div>
      </section>
    </main>

    <script src="/static/room-sign.js?v=20260612-status-viewport-fit" defer></script>
  </body>
</html>
